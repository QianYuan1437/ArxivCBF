name: Update CBF Papers

on:
  schedule:
    - cron: '0 23 * * *'   # 北京时间 07:00
    - cron: '0 4 * * *'    # 北京时间 12:00
    - cron: '0 9 * * *'    # 北京时间 17:00
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python fetch_papers.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md papers_data.json
          git diff --cached --quiet || git commit -m "chore: update CBF papers $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
